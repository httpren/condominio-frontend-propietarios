          maxLength: 10
        marca:
          type: string
          maxLength: 50
        modelo:
          type: string
          maxLength: 50
        color:
          type: string
          maxLength: 30
        tipo_vehiculo:
          $ref: '#/components/schemas/TipoVehiculoEnum'
        qr_code:
          type: string
          format: uri
          nullable: true
        qr_data:
          type: string
          description: Datos del código QR
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        propietario:
          type: integer
      required:
      - color
      - created_at
      - id
      - marca
      - modelo
      - placa
      - propietario
      - propietario_nombre
      - qr_code_url
    Visita:

    UnidadHabitacional:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        propietario_nombre:
          type: string
          readOnly: true
        numero_unidad:
          type: string
          description: 'Ej: A-101, B-203'
          maxLength: 10
        edificio:
          type: string
          nullable: true
          maxLength: 50
        area_m2:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        tipo_unidad:
          $ref: '#/components/schemas/TipoUnidadEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        propietario:
          type: integer
      required:
      - area_m2
      - created_at
      - id
      - numero_unidad
      - propietario
      - propietario_nombre

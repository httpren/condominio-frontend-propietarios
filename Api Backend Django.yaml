components:
  schemas:
    AreaComun:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          description: 'Ej: Piscina, Salón Social, Cancha'
          maxLength: 100
        descripcion:
          type: string
          nullable: true
        capacidad:
          type: integer
          maximum: 9223372036854775807
          minimum: 1
          format: int64
        tarifa_hora:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        horario_apertura:
          type: string
          format: time
          description: Hora de apertura
        horario_cierre:
          type: string
          format: time
          description: Hora de cierre
        activa:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capacidad
      - created_at
      - horario_apertura
      - horario_cierre
      - id
      - nombre
      - tarifa_hora
    ComentarioReporte:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        usuario_nombre:
          type: string
          readOnly: true
        comentario:
          type: string
        es_publico:
          type: boolean
          description: Visible para el propietario
        created_at:
          type: string
          format: date-time
          readOnly: true
        reporte:
          type: integer
        usuario:
          type: integer
      required:
      - comentario
      - created_at
      - id
      - reporte
      - usuario
      - usuario_nombre
    ComunicacionGuardia:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        guardia_nombre:
          type: string
          readOnly: true
        tipo:
          $ref: '#/components/schemas/ComunicacionGuardiaTipoEnum'
        titulo:
          type: string
          maxLength: 200
        mensaje:
          type: string
        urgente:
          type: boolean
        atendido:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        atendido_at:
          type: string
          format: date-time
          nullable: true
        guardia:
          type: integer
        atendido_por:
          type: integer
          nullable: true
      required:
      - created_at
      - guardia
      - guardia_nombre
      - id
      - mensaje
      - tipo
      - titulo
    ComunicacionGuardiaTipoEnum:
      enum:
      - comunicado
      - incidente
      - solicitud_asistencia
      - mantenimiento
      type: string
      description: |-
        * `comunicado` - Comunicado General
        * `incidente` - Reporte de Incidente
        * `solicitud_asistencia` - Solicitud de Asistencia
        * `mantenimiento` - Reporte de Mantenimiento
    Expensa:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        propietario_nombre:
          type: string
          readOnly: true
        total:
          type: string
          readOnly: true
        total_pagado_verificado:
          type: string
          readOnly: true
        saldo_pendiente:
          type: string
          readOnly: true
        esta_vencida:
          type: string
          readOnly: true
        mes_referencia:
          type: string
          format: date
          description: Primer día del mes de referencia
        cuota_basica:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        reservas:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        multas:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        fecha_vencimiento:
          type: string
          format: date
        pagado:
          type: boolean
        observaciones:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        propietario:
          type: integer
      required:
      - created_at
      - cuota_basica
      - esta_vencida
      - fecha_vencimiento
      - id
      - mes_referencia
      - propietario
      - propietario_nombre
      - saldo_pendiente
      - total
      - total_pagado_verificado
      - updated_at
    Guardia:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        turno:
          $ref: '#/components/schemas/TurnoEnum'
        activo:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - turno
      - user
    Mascota:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        propietario_nombre:
          type: string
          readOnly: true
        nombre:
          type: string
          maxLength: 100
        tipo:
          $ref: '#/components/schemas/MascotaTipoEnum'
        raza:
          type: string
          nullable: true
          maxLength: 100
        edad:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        foto:
          type: string
          format: uri
          nullable: true
        vacunas_al_dia:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        propietario:
          type: integer
      required:
      - created_at
      - id
      - nombre
      - propietario
      - propietario_nombre
      - tipo
    MascotaTipoEnum:
      enum:
      - perro
      - gato
      - ave
      - otro
      type: string
      description: |-
        * `perro` - Perro
        * `gato` - Gato
        * `ave` - Ave
        * `otro` - Otro
    MetodoPagoEnum:
      enum:
      - efectivo
      - transferencia
      - tarjeta
      - cheque
      type: string
      description: |-
        * `efectivo` - Efectivo
        * `transferencia` - Transferencia
        * `tarjeta` - Tarjeta
        * `cheque` - Cheque
    NotificacionReporte:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mensaje:
          type: string
        leido:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        leido_at:
          type: string
          format: date-time
          nullable: true
        reporte:
          type: integer
        usuario_destinatario:
          type: integer
      required:
      - created_at
      - id
      - mensaje
      - reporte
      - usuario_destinatario
